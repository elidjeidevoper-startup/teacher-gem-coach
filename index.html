<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Gem - Sua Professora de Inglês IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom Scrollbar for the chat area */
        .chat-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .chat-scroll::-webkit-scrollbar-track {
            background: #f0fdf4; /* green-50 */
        }
        .chat-scroll::-webkit-scrollbar-thumb {
            background: #bbf7d0; /* green-200 */
            border-radius: 10px;
        }
        .chat-scroll::-webkit-scrollbar-thumb:hover {
            background: #86efac; /* green-300 */
        }
        .typing-indicator span {
            animation: blink 1.4s infinite both;
            height: 6px;
            width: 6px;
            background: #166534; /* green-800 */
            border-radius: 50%;
            display: inline-block;
            margin: 0 1px;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0% { opacity: 0.2; transform: scale(0.8); }
            20% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.2; transform: scale(0.8); }
        }
        .mic-active {
            animation: pulse-mic 1.5s infinite;
        }
        @keyframes pulse-mic {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
    </style>
</head>
<body class="bg-green-100 text-green-900 font-sans h-screen flex flex-col items-center justify-center overflow-hidden">

    <!-- Landing Screen -->
    <div id="landing-screen" class="flex flex-col items-center justify-center h-full w-full bg-green-50 absolute z-50 transition-opacity duration-500">
        <div class="bg-white p-8 rounded-3xl shadow-xl max-w-md text-center border-2 border-green-200">
            <div class="w-24 h-24 bg-green-200 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                <svg class="w-12 h-12 text-green-700" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
            </div>
            <h1 class="text-3xl font-bold text-green-800 mb-2">Teacher Gem</h1>
            <p class="text-green-600 mb-8">Sua assistente IA especialista em ensino de idiomas. Aprenda inglês com atividades práticas orais e escritas!</p>
            <button id="start-btn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transform transition hover:scale-105 active:scale-95 flex items-center justify-center mx-auto gap-2">
                Começar Aula
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </button>
        </div>
    </div>

    <!-- Main App UI -->
    <div class="w-full max-w-2xl h-full sm:h-[90vh] bg-white sm:rounded-3xl shadow-2xl flex flex-col overflow-hidden border border-green-200 relative">
        
        <!-- Header -->
        <header class="bg-green-600 text-white p-4 flex items-center shadow-md z-10">
            <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center mr-3">
                <span class="text-green-600 font-bold text-xl">G</span>
            </div>
            <div>
                <h1 class="font-bold text-lg leading-tight">Teacher Gem</h1>
                <p class="text-green-100 text-xs">Sempre online para ensinar</p>
            </div>
        </header>

        <!-- Chat Area -->
        <div id="chat-container" class="flex-1 p-4 overflow-y-auto chat-scroll bg-green-50 flex flex-col gap-4">
            <!-- Messages will be injected here -->
        </div>

        <!-- Input Area -->
        <div class="p-3 bg-white border-t border-green-200">
            <div id="error-banner" class="hidden mb-2 text-xs text-red-600 bg-red-50 p-2 rounded text-center border border-red-200">
                Ocorreu um erro de conexão. Tentando novamente...
            </div>
            
            <form id="chat-form" class="flex items-end gap-2 relative">
                
                <!-- STT Language Toggle -->
                <button type="button" id="lang-toggle-btn" class="absolute -top-8 left-2 bg-blue-100 text-blue-800 text-xs py-1 px-2 rounded-t-lg border border-b-0 border-green-200 shadow-sm hover:bg-blue-200 transition" title="Idioma do Microfone">
                    Mic: <span id="current-lang-flag">🇺🇸 EN</span>
                </button>

                <div class="relative flex-1">
                    <textarea id="user-input" rows="1" class="w-full bg-green-50 text-green-900 border border-green-300 rounded-2xl py-3 px-4 pr-12 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent resize-none overflow-hidden" placeholder="Escreva ou fale sua resposta..."></textarea>
                    <button type="button" id="mic-btn" class="absolute right-2 bottom-2 w-8 h-8 flex items-center justify-center text-green-600 hover:text-green-800 rounded-full hover:bg-green-100 transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                    </button>
                </div>

                <button type="submit" id="send-btn" class="bg-green-600 hover:bg-green-700 text-white rounded-full w-12 h-12 flex items-center justify-center flex-shrink-0 transition transform hover:scale-105 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                    <svg class="w-5 h-5 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                </button>
            </form>
        </div>
    </div>

    <!-- Hidden audio element for TTS -->
    <audio id="tts-audio" class="hidden"></audio>

    <script>
        // Configuration
        const apiKey = ""; // API Key is injected by the environment
        const textModelName = "gemini-2.5-flash-preview-09-2025";
        const ttsModelName = "gemini-2.5-flash-preview-tts";
        const textApiUrl = `https://generativelanguage.googleapis.com/v1beta/models/${textModelName}:generateContent?key=${apiKey}`;
        const ttsApiUrl = `https://generativelanguage.googleapis.com/v1beta/models/${ttsModelName}:generateContent?key=${apiKey}`;
        
        const systemInstruction = `
Você é a Teacher Gem, uma professora de inglês carismática, encorajadora e especialista em ensinar falantes de português.
Sua personalidade é amigável, paciente e proativa.

REGRAS ESSENCIAIS QUE VOCÊ DEVE SEGUIR RIGOROSAMENTE EM TODAS AS RESPOSTAS:
1. INICIATIVA: Você DEVE SEMPRE conduzir a conversa. Nunca termine uma mensagem apenas concordando, elogiando ou esperando passivamente. Faça a aula avançar.
2. ENSINO: Em cada turno seu, ensine 1 a 3 vocábulos novos, uma expressão ou uma estrutura curta em inglês. Sempre inclua a tradução para o português e uma breve explicação.
3. PRÁTICA ATIVA: Imediatamente após ensinar, DÊ UMA TAREFA ao aluno. Peça para ele traduzir uma frase, responder uma pergunta simples usando o vocabulário novo, ou pedir para ele repetir algo (para treinar a escrita ou fala).
4. AVALIAÇÃO: Corrija os erros do aluno de forma gentil, elogiando o esforço antes de apontar o erro.
5. RECAPITULAÇÃO: De vez em quando, relembre palavras ensinadas em mensagens anteriores para fixação.
6. IDIOMA: Fale a maior parte do tempo em Português para explicar, mas use Inglês claramente demarcado (ex: entre aspas ou negrito) para os exemplos e palavras ensinadas.
7. FORMATO: Seja concisa. Use parágrafos curtos, emojis amigáveis 🌟 e limite-se a no máximo 3-4 parágrafos curtos por mensagem para não sobrecarregar o aluno.

Exemplo de finalização de mensagem sua: "Agora é sua vez! Como você diria 'A maçã é vermelha' em inglês?" ou "Tente pronunciar e escrever uma frase usando a palavra 'Beautiful'."
`;

        // State
        let chatHistory = [];
        let isProcessing = false;
        let isRecording = false;
        let recognition = null;
        let sttLanguage = 'en-US'; // Changed default to English for better pronunciation capture

        // DOM Elements
        const landingScreen = document.getElementById('landing-screen');
        const startBtn = document.getElementById('start-btn');
        const chatContainer = document.getElementById('chat-container');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const micBtn = document.getElementById('mic-btn');
        const ttsAudio = document.getElementById('tts-audio');
        const errorBanner = document.getElementById('error-banner');
        const langToggleBtn = document.getElementById('lang-toggle-btn');
        const currentLangFlag = document.getElementById('current-lang-flag');

        // Setup Speech Recognition
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = true;
            recognition.lang = sttLanguage;

            recognition.onstart = () => {
                isRecording = true;
                micBtn.classList.add('mic-active', 'bg-green-100');
                userInput.placeholder = "Ouvindo...";
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                let finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }

                if (finalTranscript) {
                    userInput.value = userInput.value ? userInput.value + ' ' + finalTranscript : finalTranscript;
                    autoResizeTextarea();
                } else if (interimTranscript) {
                    // Optionally show interim, but for this simple app, final is enough to update input
                }
            };

            recognition.onerror = (event) => {
                console.error("Speech recognition error", event.error);
                stopRecording();
            };

            recognition.onend = () => {
                stopRecording();
                // If there's text after voice recognition stops, auto-focus input so they can edit or hit send
                if(userInput.value) userInput.focus();
            };
        } else {
            micBtn.style.display = 'none'; // Hide mic if not supported
        }

        function toggleRecording() {
            if (isRecording) {
                recognition.stop();
            } else {
                if (recognition) {
                    userInput.value = ''; // Clear before new dictation
                    recognition.lang = sttLanguage; // Ensure current language is set
                    recognition.start();
                }
            }
        }

        function stopRecording() {
            isRecording = false;
            micBtn.classList.remove('mic-active', 'bg-green-100');
            userInput.placeholder = "Escreva ou fale sua resposta...";
        }

        // Language Toggle Logic
        langToggleBtn.addEventListener('click', () => {
            if (sttLanguage === 'pt-BR') {
                sttLanguage = 'en-US';
                currentLangFlag.textContent = '🇺🇸 EN';
                langToggleBtn.classList.replace('bg-green-100', 'bg-blue-100');
                langToggleBtn.classList.replace('text-green-800', 'text-blue-800');
            } else {
                sttLanguage = 'pt-BR';
                currentLangFlag.textContent = '🇧🇷 PT';
                langToggleBtn.classList.replace('bg-blue-100', 'bg-green-100');
                langToggleBtn.classList.replace('text-blue-800', 'text-green-800');
            }
            if (recognition) recognition.lang = sttLanguage;
        });


        // Event Listeners
        startBtn.addEventListener('click', () => {
            landingScreen.style.opacity = '0';
            setTimeout(() => {
                landingScreen.style.display = 'none';
                startLesson();
            }, 500);
        });

        micBtn.addEventListener('click', toggleRecording);

        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (text && !isProcessing) {
                handleUserSubmit(text);
            }
        });

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                chatForm.dispatchEvent(new Event('submit'));
            }
        });

        userInput.addEventListener('input', autoResizeTextarea);

        function autoResizeTextarea() {
            userInput.style.height = 'auto';
            userInput.style.height = (userInput.scrollHeight < 100 ? userInput.scrollHeight : 100) + 'px';
        }

        // Core Application Logic

        async function startLesson() {
            // Invisible prompt to kickstart the teacher's behavior
            const initialPrompt = "Olá Teacher Gem! Sou seu novo aluno. Estou pronto para a nossa primeira lição. Por favor, apresente-se rapidamente e me ensine minhas primeiras palavras, seguidas de uma atividade.";
            
            chatHistory.push({ role: "user", parts: [{ text: initialPrompt }] });
            await fetchTeacherResponse();
        }

        async function handleUserSubmit(text) {
            // Stop any playing audio
            ttsAudio.pause();
            
            // Add to UI
            appendMessage('user', text);
            userInput.value = '';
            userInput.style.height = 'auto';
            
            // Add to history
            chatHistory.push({ role: "user", parts: [{ text: text }] });
            
            await fetchTeacherResponse();
        }

        async function fetchTeacherResponse() {
            setProcessing(true);
            const typingId = appendTypingIndicator();

            const payload = {
                contents: chatHistory,
                systemInstruction: { parts: [{ text: systemInstruction }] }
            };

            try {
                const data = await fetchWithRetry(textApiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                removeElement(typingId);

                if (data.candidates && data.candidates.length > 0) {
                    const teacherText = data.candidates[0].content.parts[0].text;
                    
                    // Add to history
                    chatHistory.push({ role: "model", parts: [{ text: teacherText }] });
                    
                    // Append text to UI and immediately request audio
                    const msgId = appendMessage('teacher', teacherText, true);
                    await fetchTeacherAudio(teacherText, msgId);
                } else {
                    throw new Error("Resposta inválida da IA");
                }
            } catch (error) {
                console.error("Text Generation Error:", error);
                removeElement(typingId);
                showError("Não foi possível conectar com a Teacher Gem. Tente novamente.");
            } finally {
                setProcessing(false);
            }
        }

        async function fetchTeacherAudio(text, messageElementId) {
            const payload = {
                contents: [{ parts: [{ text: text }] }],
                generationConfig: {
                    responseModalities: ["AUDIO"],
                    speechConfig: {
                        voiceConfig: {
                            prebuiltVoiceConfig: { voiceName: "Aoede" } // Clear, friendly female voice
                        }
                    }
                },
                model: ttsModelName
            };

            try {
                const data = await fetchWithRetry(ttsApiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const audioData = data.candidates?.[0]?.content?.parts?.[0]?.inlineData;
                if (audioData && audioData.data) {
                    playAudio(audioData.data, audioData.mimeType, messageElementId);
                }
            } catch (error) {
                console.error("Audio Generation Error:", error);
                // Remove loading audio spinner if audio fails
                updateMessageAudioState(messageElementId, 'error');
            }
        }

        function playAudio(base64Data, mimeType, messageElementId) {
            try {
                // Decode base64 to array buffer
                const binaryString = atob(base64Data);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }

                // Extract sample rate from mimeType (e.g., "audio/pcm;rate=24000")
                let sampleRate = 24000; // Default
                const rateMatch = mimeType.match(/rate=(\d+)/);
                if (rateMatch && rateMatch[1]) {
                    sampleRate = parseInt(rateMatch[1], 10);
                }

                const blob = createWavFile(bytes, sampleRate);
                const url = URL.createObjectURL(blob);
                
                ttsAudio.src = url;
                ttsAudio.play().catch(e => console.warn("Autoplay blocked by browser", e));

                // Auto-ativar o microfone quando a Teacher Gem terminar de falar
                ttsAudio.onended = () => {
                    if (recognition && !isRecording) {
                        toggleRecording();
                    }
                };

                // Update UI to show replay button
                updateMessageAudioState(messageElementId, 'ready', url);

            } catch (error) {
                console.error("Error processing audio playback:", error);
                updateMessageAudioState(messageElementId, 'error');
            }
        }

        // Utils & UI Updates

        function setProcessing(processing) {
            isProcessing = processing;
            userInput.disabled = processing;
            sendBtn.disabled = processing;
            if (processing) {
                sendBtn.classList.add('opacity-50', 'cursor-not-allowed');
            } else {
                sendBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                setTimeout(() => userInput.focus(), 100);
            }
        }

        function appendMessage(sender, text, showAudioLoading = false) {
            const id = 'msg-' + Date.now();
            const wrapper = document.createElement('div');
            wrapper.id = id;
            wrapper.className = `flex w-full ${sender === 'user' ? 'justify-end' : 'justify-start'}`;

            const bubble = document.createElement('div');
            
            // Format text: basic markdown (bold) and line breaks
            const formattedText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');

            if (sender === 'user') {
                bubble.className = 'max-w-[85%] bg-white border border-green-200 text-gray-800 p-4 rounded-2xl rounded-tr-sm shadow-sm';
                bubble.innerHTML = `<p class="text-sm sm:text-base">${formattedText}</p>`;
            } else {
                bubble.className = 'max-w-[90%] bg-green-100 border border-green-300 text-green-900 p-4 rounded-2xl rounded-tl-sm shadow-sm';
                
                let innerHTML = `
                    <div class="flex items-start gap-3">
                        <div class="w-8 h-8 rounded-full bg-green-500 flex items-center justify-center flex-shrink-0 text-white font-bold text-sm shadow-sm mt-1">G</div>
                        <div class="flex-1 min-w-0">
                            <div class="text-sm sm:text-base prose prose-green">${formattedText}</div>
                `;

                if (showAudioLoading) {
                    innerHTML += `
                            <div class="mt-3 flex items-center gap-2 audio-controls">
                                <div class="w-6 h-6 flex items-center justify-center">
                                    <svg class="animate-spin h-4 w-4 text-green-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                                </div>
                                <span class="text-xs text-green-600 font-medium">Gerando áudio...</span>
                            </div>
                    `;
                }

                innerHTML += `</div></div>`;
                bubble.innerHTML = innerHTML;
            }

            wrapper.appendChild(bubble);
            chatContainer.appendChild(wrapper);
            scrollToBottom();
            return id;
        }

        function updateMessageAudioState(messageId, state, audioUrl = null) {
            const msgEl = document.getElementById(messageId);
            if (!msgEl) return;
            const controlsContainer = msgEl.querySelector('.audio-controls');
            if (!controlsContainer) return;

            if (state === 'ready' && audioUrl) {
                controlsContainer.innerHTML = `
                    <button onclick="playExistingAudio('${audioUrl}')" class="flex items-center gap-1.5 bg-green-200 hover:bg-green-300 text-green-800 text-xs px-3 py-1.5 rounded-full transition font-medium shadow-sm border border-green-300">
                        <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
                        Ouvir Novamente
                    </button>
                `;
            } else if (state === 'error') {
                controlsContainer.innerHTML = `<span class="text-xs text-red-500 font-medium">Erro ao carregar áudio</span>`;
                setTimeout(() => controlsContainer.remove(), 3000);
            }
        }

        window.playExistingAudio = function(url) {
            ttsAudio.src = url;
            ttsAudio.play();
        }

        function appendTypingIndicator() {
            const id = 'typing-' + Date.now();
            const wrapper = document.createElement('div');
            wrapper.id = id;
            wrapper.className = `flex w-full justify-start`;
            wrapper.innerHTML = `
                <div class="max-w-[80%] bg-green-100 border border-green-200 p-4 rounded-2xl rounded-tl-sm shadow-sm flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-green-500 flex items-center justify-center flex-shrink-0 text-white font-bold text-sm shadow-sm">G</div>
                    <div class="typing-indicator flex h-5 items-center">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            chatContainer.appendChild(wrapper);
            scrollToBottom();
            return id;
        }

        function removeElement(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function scrollToBottom() {
            chatContainer.scrollTo({
                top: chatContainer.scrollHeight,
                behavior: 'smooth'
            });
        }

        function showError(msg) {
            errorBanner.textContent = msg;
            errorBanner.classList.remove('hidden');
            setTimeout(() => errorBanner.classList.add('hidden'), 5000);
        }

        // Exponential backoff fetch function
        async function fetchWithRetry(url, options, maxRetries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error(`HTTP status: ${response.status}`);
                    return await response.json();
                } catch (error) {
                    if (i === maxRetries - 1) throw error;
                    console.warn(`Attempt ${i + 1} failed. Retrying in ${delays[i]}ms...`);
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        }

        // PCM to WAV conversion utility required for Gemini TTS
        function createWavFile(pcmData, sampleRate) {
            const numChannels = 1;
            const bitsPerSample = 16;
            const byteRate = sampleRate * numChannels * (bitsPerSample / 8);
            const blockAlign = numChannels * (bitsPerSample / 8);
            const dataSize = pcmData.length;
            const chunkSize = 36 + dataSize;
            const buffer = new ArrayBuffer(44 + dataSize);
            const view = new DataView(buffer);

            // RIFF chunk descriptor
            writeString(view, 0, 'RIFF');
            view.setUint32(4, chunkSize, true);
            writeString(view, 8, 'WAVE');
            // fmt sub-chunk
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, byteRate, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitsPerSample, true);
            // data sub-chunk
            writeString(view, 36, 'data');
            view.setUint32(40, dataSize, true);

            // Write PCM data
            const pcmDataView = new Uint8Array(buffer, 44);
            pcmDataView.set(pcmData);

            return new Blob([view], { type: 'audio/wav' });
        }

        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }
    </script>
</body>
